<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Example</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #eef2f3, #d9e4f5);
        padding: 30px;
        text-align: center;
      }

      h1 {
        margin-bottom: 25px;
        color: #222;
        font-size: 28px;
      }

      .container {
        max-width: 900px;
        margin: auto;
        display: grid;
        gap: 20px;
      }

      .card {
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
      }

      h2 {
        margin-bottom: 15px;
        color: #444;
      }

      img {
        width: 100%;
        max-width: 350px;
        border-radius: 12px;
        margin-top: 10px;
      }

      video,
      audio {
        width: 100%;
        margin-top: 10px;
        border-radius: 10px;
      }

      p {
        margin-top: 10px;
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <h1>Media Example (Image, Video, Audio)</h1>

    <div class="container">
      <div class="card">
        <h2>Image Example</h2>
        <img src="media/media1.jpg" alt="Image" />
        <p>This is an image example.</p>
      </div>

      <div class="card">
        <h2>Video Example</h2>
        <video controls>
          <source
            src="https://www.w3schools.com/html/mov_bbb.mp4"
            type="video/mp4"
          />
          Your browser does not support video.
        </video>
        <p>Local video file example.</p>
      </div>

      <div class="card">
        <h2>Audio Example</h2>
        <audio controls>
          <source
            src="media/file_example_MP3_700KB (1).mp3"
            type="audio/mpeg"
          />
          Your browser does not support audio.
        </audio>
        <p>Audio playback example.</p>
      </div>
    </div>
  </body>
</html>
