<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Form UI</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        background: #fff;
        padding: 25px;
        border-radius: 12px;
        max-width: 1000px;
        width: 100%;
        margin: auto;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
        color: #444;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        outline: none;
        font-size: 14px;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: #2575fc;
      }

      .checkbox-group,
      .radio-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .checkbox-group label,
      .radio-group label {
        display: flex;
        align-items: center;
        gap: 5px;
        font-weight: normal;
      }

      .inline-input {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .submit-btn {
        width: 100%;
        padding: 12px;
        border: none;
        background: #2575fc;
        color: #fff;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
      }

      .submit-btn:hover {
        background: #1a5edb;
      }

      textarea {
        resize: vertical;
      }

      @media (max-width: 480px) {
        .container {
          padding: 15px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>User Registration</h2>

      <form>
        <div class="form-group">
          <label>Username</label>
          <input type="text" placeholder="Enter your name" />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="number" placeholder="Enter phone number" />
        </div>

        <div class="form-group">
          <label>Date & Time</label>
          <input type="datetime-local" />
        </div>

        <div class="form-group">
          <label>Hobbies</label>
          <div class="checkbox-group">
            <label><input type="checkbox" /> Music</label>
            <label><input type="checkbox" /> Dance</label>
            <label><input type="checkbox" /> Food</label>
            <label><input type="checkbox" /> Traveling</label>
          </div>
        </div>

        <div class="form-group">
          <label>Favorite Color</label>
          <input type="color" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Enter email" />
        </div>

        <div class="form-group">
          <label>Upload File</label>
          <input type="file" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" />
        </div>

        <div class="form-group">
          <label>Gender</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" /> Female</label>
            <label><input type="radio" name="gender" /> Male</label>
            <label><input type="radio" name="gender" /> Other</label>
          </div>
        </div>

        <div class="form-group">
          <label>Range</label>
          <input type="range" />
        </div>

        <div class="form-group">
          <label>City</label>
          <select>
            <option>Ahmedabad</option>
            <option>Surat</option>
            <option>Mahemdabad</option>
          </select>
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea rows="3"></textarea>
        </div>

        <div class="form-group">
          <label>Choose Browser</label>
          <input list="browsers" placeholder="Type browser name" />
          <datalist id="browsers">
            <option value="Chrome"></option>
            <option value="Firefox"></option>
            <option value="Safari"></option>
            <option value="Edge"></option>
          </datalist>
        </div>

        <button class="submit-btn">Submit</button>
      </form>
    </div>
  </body>
</html>
