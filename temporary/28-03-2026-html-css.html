<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiya !</title>

    <style>
        .container{
            display: flex;
            gap: 50px;
        }
        
        .box {
            background-color: rgba(0, 64, 255, 0.544);
            margin: 10px;
            padding: 10px;
            color: blue;
            width: 200px;
            height: 200px;
            font-family: 'Chiller';
            font-size: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 1s;
        }
        .box:hover{
            background-color: rgba(255, 0, 0, 0.429);
            color: red;
            font-size: 100px;
        }
        .box:active{
            background-color: black;
        }
    </style>
</head>

<body>
   <div class="container">
     <div class="box">
        Progamming
    </div>
    <div class="box">
        Scriting
    </div>
    <div class="box">
        Markup
    </div>
   </div>
</body>

</html>
