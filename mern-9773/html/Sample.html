<!DOCTYPE html>
<html>
<head>
  <title>Advanced Table Task</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
    }

    table {
      border-collapse: collapse;
      margin: 50px auto;
      width: 80%;
      text-align: center;
    }

    th, td {
      border: 2px solid #333;
      padding: 10px;
    }

    th {
      background: #2c3e50;
      color: white;
    }

    .menu {
      background: #34495e;
      color: white;
      font-weight: bold;
    }

    .nested-table {
      width: 100%;
      border-collapse: collapse;
    }

    .nested-table td, .nested-table th {
      border: 1px solid #555;
      padding: 5px;
    }

    tr:hover {
      background: #dfe6e9;
    }
  </style>
</head>

<body>

<table>

  <!-- Header -->
  <tr>
    <th colspan="3">STUDENT DASHBOARD</th>
  </tr>

  <!-- Main Content -->
  <tr>
    <td rowspan="3" class="menu">
      Menu <br><br>
      Home <br>
      Profile <br>
      Settings
    </td>

    <td>
      <b>Student Info</b><br>
      Name: Tanvi <br>
      Class: BCA
    </td>

    <td>
      <table class="nested-table">
        <tr>
          <th>Subject</th>
          <th>Marks</th>
        </tr>
        <tr>
          <td>Math</td>
          <td>85</td>
        </tr>
        <tr>
          <td>Science</td>
          <td>90</td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <td>Attendance</td>
    <td>95%</td>
  </tr>

  <tr>
    <td>Fees</td>
    <td>Paid</td>
  </tr>

</table>

</body>
</html>
