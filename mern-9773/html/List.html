<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List</title>
  </head>
  <body>
    <!-- List -->

    <!-- 1. Ordered List -->
    <h1>Ordered List</h1>
    <ol>
      <li>Milk</li>
      <li>Tea</li>
      <li>Coffee</li>
      <li>Drink</li>
    </ol>

    <!-- 2. Unordered List -->
    <h1>Unordered List</h1>
    <ul>
      <li>Milk</li>
      <li>Tea</li>
      <li>Coffee</li>
      <li>Drink</li>
    </ul>

    <!-- 3. Description List -->
    <h1>Description List</h1>
    <dl>
      <dt>Coffee</dt>
      <dd>This is for Coffee</dd>

      <dt>Milk</dt>
      <dd>This is for Milk</dd>

      <dt>Tea</dt>
      <dd>This is for Tea</dd>
    </dl>
  </body>
</html>
